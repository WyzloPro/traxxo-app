<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traxxo — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090b;
      --surface: #111113;
      --surface-2: #0c0c10;
      --border: #1f1f23;
      --text: #fafafa;
      --muted: #71717a;
      --accent: #22d3ee;
      --green: #10b981;
      --amber: #f59e0b;
      --font: 'Inter', system-ui, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .header { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:12px 24px; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:100; }
    .header-left, .header-right { display:flex; align-items:center; gap:12px; }
    .logo { display:flex; align-items:center; gap:8px; font-size:16px; font-weight:700; }
    .divider { width:1px; height:20px; background:var(--border); }
    .pill { font-size:12px; color:var(--muted); background:var(--bg); border:1px solid var(--border); padding:5px 10px; border-radius:999px; }
    .btn { padding:8px 14px; border-radius:10px; font-size:12px; font-weight:600; font-family:var(--font); text-decoration:none; cursor:pointer; border:none; white-space:nowrap; }
    .btn-ghost { background:none; border:1px solid var(--border); color:var(--muted); }
    .btn-ghost:hover { color:var(--text); border-color:var(--muted); }
    .btn-accent { background:var(--accent); color:#000; }
    .container { max-width:1240px; margin:0 auto; padding:24px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:22px; margin-bottom:16px; }
    .hero { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:18px; }
    .hero h1 { font-size:34px; line-height:1.05; margin-bottom:8px; }
    .hero p { color:#a1a1aa; line-height:1.7; max-width:760px; }
    .section-kicker { display:flex; align-items:center; gap:8px; font-size:12px; color:#a1a1aa; text-transform:uppercase; letter-spacing:.08em; font-weight:700; margin-bottom:12px; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); }
    .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .stat { background:var(--surface-2); border:1px solid var(--border); border-radius:14px; padding:16px; }
    .stat-label { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:700; margin-bottom:10px; }
    .stat-value { font-size:30px; font-weight:700; }
    .client-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:20px; margin-bottom:16px; }
    .client-head { display:flex; justify-content:space-between; gap:14px; margin-bottom:16px; }
    .client-name { font-size:20px; font-weight:700; margin-bottom:4px; }
    .client-meta { color:var(--muted); font-size:14px; line-height:1.5; }
    .client-plan { font-size:11px; font-weight:700; padding:5px 10px; border-radius:999px; border:1px solid rgba(34,211,238,.2); color:var(--accent); background:rgba(34,211,238,.08); height:max-content; }
    .projects-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .project-card { background:var(--surface-2); border:1px solid var(--border); border-radius:14px; padding:16px; }
    .project-title { font-size:18px; font-weight:700; margin-bottom:6px; }
    .project-meta { color:var(--muted); font-size:13px; line-height:1.6; margin-bottom:12px; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .chip { font-size:11px; font-weight:700; padding:5px 10px; border-radius:999px; border:1px solid var(--border); background:#0a0a0d; color:#d4d4d8; }
    .chip.ok { color:var(--green); border-color:rgba(16,185,129,.22); background:rgba(16,185,129,.08); }
    .chip.warn { color:var(--amber); border-color:rgba(245,158,11,.22); background:rgba(245,158,11,.08); }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    .empty-state { color:var(--muted); text-align:center; padding:70px 24px; }
    @media (max-width: 980px) {
      .container { padding:16px; }
      .stats-grid, .projects-grid { grid-template-columns:1fr; }
      .hero, .client-head { display:block; }
      .client-plan { margin-top:12px; display:inline-flex; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="7" fill="#22d3ee" fill-opacity=".12"/>
          <path d="M5 12h4l2-5 2 10 2-5h2" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        traxxo
      </div>
      <div class="divider"></div>
      <div class="pill" id="admin-email">Admin</div>
    </div>
    <div class="header-right">
      <a href="/perfil.html" class="btn btn-ghost">Mi cuenta</a>
    </div>
  </div>

  <div class="container" id="main-container">
    <div class="empty-state">Cargando admin Traxxo...</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ghqttckqvjptxhihojey.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdocXR0Y2txdmpwdHhoaWhvamV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDU1OTYsImV4cCI6MjA5MTIyMTU5Nn0.KlPDplMIIWQwx5oafvkfxbsm0dzPb0cbTJpCM83cqK4';
    const ADMIN_EMAILS = ['danielpetermanns@gmail.com', 'marianneroche80@gmail.com'];
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  (async function() {
  const _params = new URLSearchParams(window.location.search);
  const _at = _params.get('access_token');
  const _rt = _params.get('refresh_token');
  if (_at && _rt) {
    await sb.auth.setSession({ access_token: _at, refresh_token: _rt });
    window.history.replaceState({}, '', window.location.pathname);
  }
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/'; return; }
      const email = String(session.user.email || '').toLowerCase();
      document.getElementById('admin-email').textContent = email || 'Admin';

      if (!ADMIN_EMAILS.includes(email)) {
        document.getElementById('main-container').innerHTML = '<div class="empty-state">Esta vista interna esta disponible solo para administradores de Traxxo.</div>';
        return;
      }

      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/list-admin-projects`, {
          method: 'GET',
          headers: {
            Authorization: 'Bearer ' + session.access_token,
            apikey: SUPABASE_ANON
          }
        });

        const raw = await res.text();
        let data = null;
        try {
          data = raw ? JSON.parse(raw) : {};
        } catch (_) {
          data = { error: raw || 'Respuesta no JSON del endpoint admin' };
        }

        if (!res.ok || data.error) {
          document.getElementById('main-container').innerHTML =
            '<div class="empty-state">' +
            escapeHtml(data.error || ('Error admin · HTTP ' + res.status)) +
            '<br><br><span style="font-size:12px">Sesión actual: ' + escapeHtml(email) + '</span></div>';
          return;
        }

        renderAdmin(data);
      } catch (error) {
        document.getElementById('main-container').innerHTML =
          '<div class="empty-state">No se pudo conectar con la vista admin.<br><br><span style="font-size:12px">' +
          escapeHtml(String(error && error.message ? error.message : error || 'Error desconocido')) +
          '</span></div>';
      }
    });

    function renderAdmin(data) {
      const stats = data.stats || {};
      const clients = Array.isArray(data.clients) ? data.clients : [];

      document.getElementById('main-container').innerHTML = `
        <div class="card">
          <div class="hero">
            <div>
              <div class="section-kicker"><span class="dot"></span>Admin Traxxo</div>
              <h1>Backend interno de clientes y proyectos</h1>
              <p>Aqui ves la cartera viva de Traxxo: clientes, proyectos, conexiones activas y acceso directo al backend interno por proyecto.</p>
            </div>
          </div>
          <div class="stats-grid">
            <div class="stat">
              <div class="stat-label">Clientes</div>
              <div class="stat-value">${Number(stats.clients || 0)}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Proyectos</div>
              <div class="stat-value">${Number(stats.projects || 0)}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Proyectos activos</div>
              <div class="stat-value">${Number(stats.active_projects || 0)}</div>
            </div>
          </div>
        </div>
        ${clients.length ? clients.map(renderClientCard).join('') : '<div class="empty-state">Todavia no hay clientes cargados.</div>'}
      `;
    }

    function renderClientCard(client) {
      const projects = Array.isArray(client.projects) ? client.projects : [];
      return `
        <div class="client-card">
          <div class="client-head">
            <div>
              <div class="client-name">${escapeHtml(client.company || client.name || client.email || 'Cliente')}</div>
              <div class="client-meta">${escapeHtml(client.name || 'Sin nombre')} · ${escapeHtml(client.email || 'Sin email')} · ${projects.length} proyecto(s)</div>
            </div>
            <div class="client-plan">${escapeHtml(formatPlan(client.plan || 'early_access'))}</div>
          </div>
          <div class="projects-grid">
            ${projects.map(renderProjectCard).join('')}
          </div>
        </div>`;
    }

    function renderProjectCard(project) {
      const backendHref = '/traxxo/project/' + encodeURIComponent(project.slug) + '?project_id=' + encodeURIComponent(project.id);
      const clientHref = '/project/' + encodeURIComponent(project.slug);
      return `
        <div class="project-card">
          <div class="project-title">${escapeHtml(project.domain || project.slug || 'Proyecto')}</div>
          <div class="project-meta">
            ${escapeHtml(project.platform || 'Sin plataforma')} · ${project.active ? 'Activo' : 'Inactivo'}<br>
            ${Number(project.snapshot_count || 0)} snapshots · ultima semana ${escapeHtml(project.latest_week_start || '—')}
          </div>
          <div class="chips">
            <span class="chip ${project.connections?.gsc ? 'ok' : ''}">GSC</span>
            <span class="chip ${project.connections?.ga4 ? 'ok' : ''}">GA4</span>
            <span class="chip ${project.connections?.semrush ? 'ok' : ''}">Semrush</span>
            <span class="chip ${project.connections?.semrush_audit ? 'ok' : 'warn'}">Audit</span>
            <span class="chip ${project.connections?.web ? 'ok' : ''}">Web</span>
            <span class="chip ${project.connections?.ads ? 'ok' : 'warn'}">Ads</span>
          </div>
          <div class="actions">
            <a class="btn btn-accent" href="${backendHref}">Abrir backend</a>
            <a class="btn btn-ghost" href="${clientHref}">Ver dashboard cliente</a>
          </div>
        </div>`;
    }

    function formatPlan(plan) {
      const value = String(plan || 'early_access').toLowerCase();
      if (value === 'basic') return 'Basic';
      if (value === 'pro') return 'Pro';
      if (value === 'agency') return 'Agency';
      return 'Early Access';
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
