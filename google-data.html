<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traxxo — Datos Google</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#09090b; --surface:#111113; --border:#1f1f23;
      --text:#fafafa; --muted:#71717a; --accent:#22d3ee;
      --green:#10b981; --purple:#8b5cf6; --orange:#f59e0b;
      --font:'Inter', system-ui, sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; -webkit-font-smoothing:antialiased; }
    .header { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:100; }
    .header-left, .header-right { display:flex; align-items:center; gap:12px; }
    .logo { display:flex; align-items:center; gap:8px; font-size:16px; font-weight:700; }
    .divider { width:1px; height:20px; background:var(--border); }
    .domain-badge { font-size:12px; color:var(--muted); background:var(--bg); border:1px solid var(--border); padding:4px 10px; border-radius:20px; }
    .plan-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; background:rgba(34,211,238,.1); color:var(--accent); border:1px solid rgba(34,211,238,.2); }
    .btn { padding:8px 14px; border-radius:8px; font-size:12px; font-weight:600; font-family:var(--font); cursor:pointer; border:none; transition:opacity .15s; white-space:nowrap; text-decoration:none; }
    .btn-ghost { background:none; border:1px solid var(--border); color:var(--muted); }
    .btn-ghost:hover { color:var(--text); border-color:var(--muted); }
    .btn-accent { background:var(--accent); color:#000; }
    .btn-accent:hover { opacity:.85; }
    .btn-accent:disabled { opacity:.5; cursor:not-allowed; }
    #refresh-btn { display:flex; align-items:center; gap:6px; }
    #refresh-btn.spinning svg { animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .container { max-width:1180px; margin:0 auto; padding:24px; }
    .hero { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px; }
    .hero h1 { font-size:28px; line-height:1.1; margin-bottom:8px; }
    .hero p { font-size:14px; color:var(--muted); max-width:760px; line-height:1.5; }
    .badge { font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; background:rgba(34,211,238,.08); border:1px solid rgba(34,211,238,.2); color:var(--accent); }
    .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:16px; }
    .grid-2 { display:grid; grid-template-columns:1.25fr .95fr; gap:16px; margin-bottom:16px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px; }
    .card-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .card-title { font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:700; }
    .kpi-value { font-size:22px; font-weight:700; margin-bottom:6px; }
    .kpi-sub { font-size:12px; color:var(--muted); }
    .table-wrap { overflow:auto; border:1px solid var(--border); border-radius:12px; }
    table { width:100%; border-collapse:collapse; min-width:760px; }
    th, td { text-align:left; padding:12px 14px; border-bottom:1px solid rgba(255,255,255,.05); font-size:13px; }
    th { font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); background:rgba(255,255,255,.01); }
    tr:last-child td { border-bottom:none; }
    .mono { font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
    .code { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:14px; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px; color:#cbd5e1; overflow:auto; max-height:420px; white-space:pre-wrap; }
    .list { display:grid; gap:10px; }
    .list-item { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:10px 12px; border:1px solid rgba(255,255,255,.05); border-radius:12px; background:rgba(255,255,255,.01); }
    .list-label { font-size:13px; color:var(--muted); }
    .list-value { font-size:13px; color:var(--text); font-weight:600; }
    .msg { display:none; margin-top:12px; padding:12px 14px; border-radius:12px; font-size:13px; }
    .msg.show { display:block; }
    .msg.success { background:rgba(16,185,129,.12); color:var(--green); border:1px solid rgba(16,185,129,.2); }
    .msg.error { background:rgba(239,68,68,.12); color:#fca5a5; border:1px solid rgba(239,68,68,.2); }
    .msg.info { background:rgba(34,211,238,.1); color:var(--accent); border:1px solid rgba(34,211,238,.2); }
    .empty { color:var(--muted); font-size:13px; }
    @media (max-width: 980px) {
      .grid-4, .grid-2 { grid-template-columns:1fr; }
      .hero { flex-direction:column; }
      .header { padding:12px 16px; }
      .container { padding:16px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="7" fill="#22d3ee" fill-opacity=".12"/>
          <path d="M5 12h4l2-5 2 10 2-5h2" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        traxxo
      </div>
      <div class="divider"></div>
      <div class="domain-badge" id="header-domain">Cargando...</div>
    </div>
    <div class="header-right">
      <span class="plan-badge" id="header-plan">Basic</span>
      <button class="btn btn-accent" id="refresh-btn" onclick="refreshGoogleData()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
        </svg>
        Actualizar
      </button>
      <a href="/dashboard.html" class="btn btn-ghost" id="analysis-link">← Dashboard análisis</a>
    </div>
  </div>

  <div class="container" id="main-container">
    <div style="text-align:center;padding:80px 24px;color:var(--muted)">Cargando datos Google...</div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://ghqttckqvjptxhihojey.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdocXR0Y2txdmpwdHhoaWhvamV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDU1OTYsImV4cCI6MjA5MTIyMTU5Nn0.KlPDplMIIWQwx5oafvkfxbsm0dzPb0cbTJpCM83cqK4';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    let currentSession = null;
    let currentProject = null;
    let allSnapshots = [];
    let currentClient = null;

    sb.auth.getSession().then(async function({ data: { session } }) {
      if (!session) { window.location.href = '/'; return; }
      currentSession = session;
      var requestedProjectSlug = getRequestedProjectSlug();

      var { data: projects } = await sb.from('projects')
        .select('*')
        .eq('client_id', session.user.id)
        .eq('active', true);

      if (!projects || !projects.length) {
        renderNoProject();
        return;
      }

      currentProject = resolveProject(projects, requestedProjectSlug);
      if (!currentProject) {
        renderNoProject('No se ha encontrado ese proyecto.');
        return;
      }

      syncProjectPath(currentProject);

      var { data: client } = await sb.from('clients')
        .select('plan')
        .eq('id', session.user.id)
        .single();
      currentClient = client || null;

      document.getElementById('header-domain').textContent = currentProject.domain || currentProject.gsc_site_url || 'Sin dominio';
      document.getElementById('header-plan').textContent = formatPlan(client?.plan || 'basic');
      document.getElementById('analysis-link').href = getProjectPath(currentProject);

      await loadSnapshots();
      renderGoogleData();
    });

    async function loadSnapshots() {
      var { data: snapshots } = await sb.from('weekly_snapshots')
        .select('*')
        .eq('project_id', currentProject.id)
        .order('week_start', { ascending: false })
        .limit(26);
      allSnapshots = snapshots || [];
    }

    function renderGoogleData() {
      if (!allSnapshots.length) {
        document.getElementById('main-container').innerHTML = `
          <div class="card">
            <div class="hero">
              <div>
                <h1>Datos Google Search Console</h1>
                <p>Esta pantalla enseña los datos crudos que ya ha descargado Traxxo para este proyecto, antes de convertirlos en lectura o recomendaciones.</p>
              </div>
              <span class="badge">Sin snapshots todavía</span>
            </div>
            <div class="empty">Todavía no hay snapshots de GSC para este proyecto. Pulsa <strong>Actualizar</strong> para generar el primero.</div>
            <div id="page-msg" class="msg"></div>
          </div>`;
        return;
      }

      var latest = allSnapshots[0];
      document.getElementById('main-container').innerHTML = `
        <div class="hero">
          <div>
            <h1>Datos Google Search Console</h1>
            <p>Esta vista separa la capa de fuente de la capa de análisis. Aquí ves lo que Traxxo ya ha descargado de GSC para <strong>${escapeHtml(currentProject.domain || currentProject.gsc_site_url || 'este proyecto')}</strong> y lo que luego alimentará el dashboard inteligente.</p>
          </div>
          <span class="badge">${allSnapshots.length} snapshots cargados</span>
        </div>

        <div class="grid-4">
          ${renderKPI('Última semana', formatWeek(latest.week_start), 'Periodo base para el análisis')}
          ${renderKPI('Clics', fmtNum(latest.gsc_clicks), 'Dato descargado de GSC')}
          ${renderKPI('Impresiones', fmtNum(latest.gsc_impressions), 'Dato descargado de GSC')}
          ${renderKPI('Posición media', (latest.gsc_position || 0).toFixed(1), 'CTR ' + ((latest.gsc_ctr || 0).toFixed(2)) + '%')}
        </div>

        <div class="grid-2">
          <div class="card">
            <div class="card-header">
              <div class="card-title">Histórico de snapshots GSC</div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Semana</th>
                    <th>Clics</th>
                    <th>Impresiones</th>
                    <th>CTR</th>
                    <th>Posición</th>
                    <th>Actualizado</th>
                  </tr>
                </thead>
                <tbody>
                  ${allSnapshots.map(renderSnapshotRow).join('')}
                </tbody>
              </table>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">Lectura de fuente disponible hoy</div>
            </div>
            <div class="list">
              <div class="list-item"><div class="list-label">Propiedad GSC</div><div class="list-value mono">${escapeHtml(currentProject.gsc_site_url || 'No configurada')}</div></div>
              <div class="list-item"><div class="list-label">Snapshots guardados</div><div class="list-value">${allSnapshots.length}</div></div>
              <div class="list-item"><div class="list-label">Topics calculados</div><div class="list-value">${Array.isArray(latest.gsc_by_topic) ? latest.gsc_by_topic.length : 0}</div></div>
              <div class="list-item"><div class="list-label">Último refresco</div><div class="list-value">${formatDateTime(latest.created_at)}</div></div>
            </div>
            <div style="height:14px"></div>
            <div class="card-title" style="margin-bottom:10px">Snapshot actual</div>
            <div class="code">${escapeHtml(JSON.stringify(latest, null, 2))}</div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">Qué falta para una vista más rica</div>
          </div>
          <div class="list">
            <div class="list-item"><div class="list-label">Pages, queries, countries, devices y appearance</div><div class="list-value">Pendiente de ampliar `collect-gsc`</div></div>
            <div class="list-item"><div class="list-label">Backfill inicial de 4 meses</div><div class="list-value">Pendiente de estabilizar</div></div>
            <div class="list-item"><div class="list-label">Clasificación por topics</div><div class="list-value">${currentProject.topics && currentProject.topics.length ? 'Configurada' : 'Todavía vacía'}</div></div>
          </div>
          <div id="page-msg" class="msg"></div>
        </div>`;
    }

    function renderKPI(label, value, sub) {
      return `
        <div class="card">
          <div class="card-title">${label}</div>
          <div class="kpi-value">${value}</div>
          <div class="kpi-sub">${sub}</div>
        </div>`;
    }

    function renderSnapshotRow(snap) {
      return `
        <tr>
          <td>${formatWeek(snap.week_start)}</td>
          <td>${fmtNum(snap.gsc_clicks)}</td>
          <td>${fmtNum(snap.gsc_impressions)}</td>
          <td>${(snap.gsc_ctr || 0).toFixed(2)}%</td>
          <td>${(snap.gsc_position || 0).toFixed(1)}</td>
          <td>${formatDateTime(snap.created_at)}</td>
        </tr>`;
    }

    async function refreshGoogleData() {
      var btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.classList.add('spinning');
      showMsg('Actualizando datos de Google Search Console...', 'info');

      try {
        var res = await fetch(`${SUPABASE_URL}/functions/v1/collect-gsc`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + SUPABASE_ANON
          },
          body: JSON.stringify({ project_id: currentProject.id })
        });
        var data = await res.json();

        if (!res.ok || data.error) {
          showMsg(data.error || 'No se pudieron actualizar los datos de GSC.', 'error');
          return;
        }

        await loadSnapshots();
        renderGoogleData();
        showMsg('Datos de GSC actualizados para este proyecto.', 'success');
      } catch (e) {
        console.error(e);
        showMsg('Error de red al actualizar GSC.', 'error');
      } finally {
        btn.disabled = false;
        btn.classList.remove('spinning');
      }
    }

    function showMsg(text, type) {
      var msg = document.getElementById('page-msg');
      if (!msg) return;
      msg.className = 'msg show ' + (type || 'info');
      msg.textContent = text;
    }

    function renderNoProject(customMessage) {
      document.getElementById('main-container').innerHTML = `
        <div class="card" style="text-align:center;padding:80px 24px">
          <div style="font-size:18px;font-weight:700;margin-bottom:8px">No hay proyecto disponible</div>
          <div class="empty" style="margin-bottom:18px">${customMessage || 'Completa el onboarding para poder ver datos de Google.'}</div>
          <a href="/" class="btn btn-accent">Ir al onboarding</a>
        </div>`;
    }

    function normalizeProjectDomain(project) {
      var raw = project?.domain || project?.gsc_site_url || project?.intake_data?.url || '';
      var clean = String(raw || '').trim().toLowerCase();
      clean = clean.replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/$/, '');
      return clean;
    }

    function getProjectSlug(project) {
      var hostname = normalizeProjectDomain(project);
      if (!hostname) return 'project';
      var first = hostname.split('.')[0] || hostname;
      return first
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '') || 'project';
    }

    function getProjectPath(project) {
      return '/project/' + getProjectSlug(project);
    }

    function getGoogleDataPath(project) {
      return getProjectPath(project) + '/google';
    }

    function getRequestedProjectSlug() {
      var match = window.location.pathname.match(/^\/project\/([^/]+)\/google$/);
      if (match && match[1]) return decodeURIComponent(match[1]).toLowerCase();
      var params = new URLSearchParams(window.location.search);
      return (params.get('project') || '').toLowerCase() || null;
    }

    function resolveProject(projects, requestedSlug) {
      if (!projects || !projects.length) return null;
      if (!requestedSlug) return projects[0];
      return projects.find(function(project) {
        return getProjectSlug(project) === requestedSlug || String(project.id).toLowerCase() === requestedSlug;
      }) || null;
    }

    function syncProjectPath(project) {
      var target = getGoogleDataPath(project);
      if (window.location.pathname !== target) {
        window.history.replaceState({}, '', target);
      }
    }

    function fmtNum(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return (n || 0).toString();
    }

    function formatWeek(dateStr) {
      if (!dateStr) return '—';
      var d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' });
    }

    function formatDateTime(dateStr) {
      if (!dateStr) return '—';
      return new Date(dateStr).toLocaleString('es-ES', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    function formatPlan(plan) {
      plan = String(plan || 'basic');
      return plan.charAt(0).toUpperCase() + plan.slice(1);
    }

    function escapeHtml(text) {
      return String(text == null ? '' : text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
