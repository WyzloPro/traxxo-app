<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traxxo — Datos Semrush</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#09090b; --surface:#111113; --border:#1f1f23;
      --text:#fafafa; --muted:#71717a; --accent:#22d3ee;
      --green:#10b981; --orange:#f59e0b; --font:'Inter', system-ui, sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; -webkit-font-smoothing:antialiased; }
    .header { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:100; }
    .header-left, .header-right { display:flex; align-items:center; gap:12px; }
    .logo { display:flex; align-items:center; gap:8px; font-size:16px; font-weight:700; }
    .divider { width:1px; height:20px; background:var(--border); }
    .domain-badge { font-size:12px; color:var(--muted); background:var(--bg); border:1px solid var(--border); padding:4px 10px; border-radius:20px; }
    .plan-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; background:rgba(34,211,238,.1); color:var(--accent); border:1px solid rgba(34,211,238,.2); }
    .btn { padding:8px 14px; border-radius:8px; font-size:12px; font-weight:600; font-family:var(--font); cursor:pointer; border:none; transition:opacity .15s; white-space:nowrap; text-decoration:none; }
    .btn-ghost { background:none; border:1px solid var(--border); color:var(--muted); }
    .btn-accent { background:var(--accent); color:#000; }
    .btn-accent:hover, .btn-ghost:hover { opacity:.85; }
    .btn-accent:disabled { opacity:.5; cursor:not-allowed; }
    #refresh-btn { display:flex; align-items:center; gap:6px; }
    #refresh-btn.spinning svg { animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .container { max-width:1180px; margin:0 auto; padding:24px; }
    .hero { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px; }
    .hero h1 { font-size:28px; line-height:1.1; margin-bottom:8px; }
    .hero p { font-size:14px; color:var(--muted); max-width:760px; line-height:1.5; }
    .badge { font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; background:rgba(34,211,238,.08); border:1px solid rgba(34,211,238,.2); color:var(--accent); }
    .grid-4, .grid-3, .grid-2 { display:grid; gap:16px; margin-bottom:16px; }
    .grid-4 { grid-template-columns:repeat(4,1fr); }
    .grid-3 { grid-template-columns:repeat(3,1fr); }
    .grid-2 { grid-template-columns:1fr 1fr; }
    .detail-stack { display:grid; gap:16px; margin-bottom:16px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px; }
    .card-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .card-title { font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:700; }
    .kpi-value { font-size:22px; font-weight:700; margin-bottom:6px; }
    .kpi-sub { font-size:12px; color:var(--muted); }
    .table-wrap { overflow:auto; border:1px solid var(--border); border-radius:12px; }
    table { width:100%; border-collapse:collapse; min-width:760px; }
    th, td { text-align:left; padding:12px 14px; border-bottom:1px solid rgba(255,255,255,.05); font-size:13px; }
    th { font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); background:rgba(255,255,255,.01); }
    tr:last-child td { border-bottom:none; }
    .msg { display:none; margin-top:12px; padding:12px 14px; border-radius:12px; font-size:13px; }
    .msg.show { display:block; }
    .msg.success { background:rgba(16,185,129,.12); color:var(--green); border:1px solid rgba(16,185,129,.2); }
    .msg.error { background:rgba(239,68,68,.12); color:#fca5a5; border:1px solid rgba(239,68,68,.2); }
    .msg.info { background:rgba(34,211,238,.1); color:var(--accent); border:1px solid rgba(34,211,238,.2); }
    .empty { color:var(--muted); font-size:13px; }
    .pill { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; }
    .pill.ok { background:rgba(16,185,129,.12); color:var(--green); border:1px solid rgba(16,185,129,.2); }
    .pill.missing { background:rgba(239,68,68,.12); color:#fca5a5; border:1px solid rgba(239,68,68,.2); }
    .pill.partial { background:rgba(245,158,11,.12); color:var(--orange); border:1px solid rgba(245,158,11,.2); }
    .mono { font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
    .code { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:14px; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px; color:#cbd5e1; overflow:auto; max-height:320px; white-space:pre-wrap; }
    details.fold { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px; }
    details.fold summary { list-style:none; display:flex; align-items:center; justify-content:space-between; gap:16px; cursor:pointer; }
    details.fold summary::-webkit-details-marker { display:none; }
    .fold-title { font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:700; }
    .fold-body { margin-top:16px; display:grid; gap:14px; }
    .list { display:grid; gap:10px; }
    .list-item { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:10px 12px; border:1px solid rgba(255,255,255,.05); border-radius:12px; background:rgba(255,255,255,.01); }
    .list-label { font-size:13px; color:var(--muted); }
    .list-value { font-size:13px; color:var(--text); font-weight:600; }
    .mini-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; }
    .mini-series { min-width:0; }
    .mini-chart { display:flex; align-items:flex-end; gap:8px; height:210px; padding-top:8px; }
    .mini-bar-wrap { flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:8px; height:100%; }
    .mini-bar { width:100%; border-radius:10px 10px 4px 4px; min-height:6px; background:var(--accent); opacity:.9; }
    .mini-bar.orange { background:var(--orange); }
    .mini-bar.green { background:var(--green); }
    .mini-label { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
    .mini-value { font-size:11px; color:var(--text); font-weight:600; }
    @media (max-width: 980px) {
      .grid-4, .grid-3, .grid-2, .mini-grid { grid-template-columns:1fr; }
      .hero { flex-direction:column; }
      .header { padding:12px 16px; }
      .container { padding:16px; }
      .mini-chart { height:180px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="7" fill="#22d3ee" fill-opacity=".12"/>
          <path d="M5 12h4l2-5 2 10 2-5h2" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        traxxo
      </div>
      <div class="divider"></div>
      <div class="domain-badge" id="header-domain">Cargando...</div>
    </div>
    <div class="header-right">
      <span class="plan-badge" id="header-plan">Basic</span>
      <button class="btn btn-accent" id="refresh-btn" onclick="refreshSemrushData()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
        </svg>
        Actualizar
      </button>
      <a href="/google-data.html" class="btn btn-ghost" id="gsc-link">Datos GSC</a>
      <a href="/ga4-data.html" class="btn btn-ghost" id="ga4-link">Datos GA4</a>
      <a href="/dashboard.html" class="btn btn-ghost" id="analysis-link">← Dashboard analisis</a>
    </div>
  </div>

  <div class="container" id="main-container">
    <div style="text-align:center;padding:80px 24px;color:var(--muted)">Cargando datos Semrush...</div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://ghqttckqvjptxhihojey.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdocXR0Y2txdmpwdHhoaWhvamV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDU1OTYsImV4cCI6MjA5MTIyMTU5Nn0.KlPDplMIIWQwx5oafvkfxbsm0dzPb0cbTJpCM83cqK4';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    let currentProject = null;
    let allSnapshots = [];
    let currentKeywords = [];
    let currentKeywordCount = 0;
    let currentAuditSummary = null;

    sb.auth.getSession().then(async function({ data: { session } }) {
      if (!session) { window.location.href = '/'; return; }
      var requestedProjectSlug = getRequestedProjectSlug();

      var { data: projects } = await sb.from('projects')
        .select('*')
        .eq('client_id', session.user.id)
        .eq('active', true);

      if (!projects || !projects.length) return renderNoProject();

      currentProject = resolveProject(projects, requestedProjectSlug);
      if (!currentProject) return renderNoProject('No se ha encontrado ese proyecto.');

      syncProjectPath(currentProject);

      var { data: client } = await sb.from('clients').select('plan').eq('id', session.user.id).single();
      document.getElementById('header-domain').textContent = currentProject.domain || currentProject.gsc_site_url || 'Sin dominio';
      document.getElementById('header-plan').textContent = formatPlan(client?.plan || 'basic');
      document.getElementById('analysis-link').href = getProjectPath(currentProject);
      document.getElementById('gsc-link').href = getProjectPath(currentProject) + '/google';
      document.getElementById('ga4-link').href = getProjectPath(currentProject) + '/ga4';

      await loadSnapshots();
      await loadDetailData();
      renderSemrushData();
    });

    async function loadSnapshots() {
      var { data: snapshots } = await sb.from('weekly_snapshots')
        .select('*')
        .eq('project_id', currentProject.id)
        .order('week_start', { ascending: false })
        .limit(26);
      allSnapshots = (snapshots || []).filter(function(snapshot) {
        return Number(snapshot.semrush_keywords || 0) > 0
          || Number(snapshot.semrush_top3 || 0) > 0
          || Number(snapshot.semrush_top10 || 0) > 0;
      });
    }

    async function loadDetailData() {
      if (!allSnapshots.length) {
        currentKeywords = [];
        currentKeywordCount = 0;
        currentAuditSummary = null;
        return;
      }

      var latest = allSnapshots[0];
      var [{ count }, { data: keywords }, { data: auditSummary }] = await Promise.all([
        sb.from('snapshot_semrush_keywords').select('*', { count: 'exact', head: true }).eq('snapshot_id', latest.id),
        sb.from('snapshot_semrush_keywords').select('*').eq('snapshot_id', latest.id).order('position', { ascending: true }).limit(10),
        sb.from('snapshot_semrush_audit_summary').select('*').eq('snapshot_id', latest.id).maybeSingle(),
      ]);

      currentKeywordCount = count || 0;
      currentKeywords = keywords || [];
      currentAuditSummary = auditSummary || null;
    }

    function renderSemrushData() {
      if (!currentProject.semrush_api_key) {
        document.getElementById('main-container').innerHTML = `
          <div class="card">
            <div class="hero">
              <div>
                <h1>Datos Semrush</h1>
                <p>Esta vista separa la fuente Semrush de la capa de analisis. Primero conectamos la API y descargamos la materia prima; despues el cerebro la usa.</p>
              </div>
              <span class="badge">Semrush pendiente</span>
            </div>
            <div class="empty">Todavia no hay una API key de Semrush guardada para este proyecto. Ve a <strong>Mi cuenta</strong> y guardala primero.</div>
            <div id="page-msg" class="msg"></div>
          </div>`;
        return;
      }

      if (!allSnapshots.length) {
        document.getElementById('main-container').innerHTML = `
          <div class="card">
            <div class="hero">
              <div>
                <h1>Datos Semrush</h1>
                <p>Aqui veras la fuente cruda de posiciones organicas que Traxxo descargue desde Semrush para <strong>${escapeHtml(currentProject.domain || 'este proyecto')}</strong>.</p>
              </div>
              <span class="badge">Sin snapshots todavia</span>
            </div>
            <div class="empty">La API key ya esta guardada, pero aun no hay snapshots de Semrush. Pulsa <strong>Actualizar</strong> para generar el primero.</div>
            <div id="page-msg" class="msg"></div>
          </div>`;
        return;
      }

      var latest = allSnapshots[0];
      var topUrls = buildTopUrls(currentKeywords);
      document.getElementById('main-container').innerHTML = `
        <div class="hero">
          <div>
            <h1>Datos Semrush</h1>
            <p>Esta vista separa la capa de fuente de la capa de analisis. Aqui ves la auditoria tecnica y las posiciones organicas que Traxxo ya ha descargado de Semrush para <strong>${escapeHtml(currentProject.domain || 'este proyecto')}</strong>.</p>
          </div>
          <span class="badge">${allSnapshots.length} snapshots cargados</span>
        </div>

        <div class="grid-4">
          ${renderKPI('Ultima semana', formatWeek(latest.week_start), 'Periodo base para la lectura')}
          ${renderKPI('Keywords', fmtNum(latest.semrush_keywords), 'Dato descargado de Semrush')}
          ${renderKPI('Top 3', fmtNum(latest.semrush_top3), 'Keywords mejor posicionadas')}
          ${renderKPI('Top 10', fmtNum(latest.semrush_top10), 'Cobertura organica visible')}
        </div>

        <div class="card" style="margin-bottom:16px">
          <div class="card-header">
            <div class="card-title">Auditoria tecnica Semrush</div>
            <span class="badge">${currentAuditSummary ? 'Resumen disponible' : (currentProject.semrush_project_id ? 'Project ID conectado' : 'Falta project ID')}</span>
          </div>
          ${renderAuditSummary(currentAuditSummary, currentProject.semrush_project_id)}
        </div>

        <div class="card" style="margin-bottom:16px">
          <div class="card-header">
            <div class="card-title">Series semanales disponibles</div>
          </div>
          ${renderWeeklySeries(allSnapshots)}
        </div>

        <div class="detail-stack">
          <div class="card">
            <div class="card-header">
              <div class="card-title">Top keywords Semrush</div>
              <span class="badge">${currentKeywords.length} visibles · ${currentKeywordCount} recogidas</span>
            </div>
            ${renderKeywordsTable(currentKeywords)}
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">Top URLs derivadas de keywords</div>
              <span class="badge">${topUrls.length} visibles</span>
            </div>
            ${renderUrlsTable(topUrls)}
          </div>
        </div>

        <div class="card" style="margin-bottom:16px">
          <div class="card-header">
            <div class="card-title">Historico de snapshots Semrush</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Periodo</th>
                  <th>Keywords</th>
                  <th>Top 3</th>
                  <th>Top 10</th>
                  <th>Posicion media</th>
                  <th>Actualizado</th>
                </tr>
              </thead>
              <tbody>
                ${allSnapshots.map(renderSnapshotRow).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">Cobertura actual de datos Semrush</div>
          </div>
          <div class="grid-3" style="margin-bottom:0">
            <div class="list-item"><div class="list-label">API key Semrush</div><div class="pill ok">Conectada</div></div>
            <div class="list-item"><div class="list-label">Project ID para auditoria</div><div class="pill ${currentProject.semrush_project_id ? 'ok' : 'missing'}">${currentProject.semrush_project_id ? 'Conectado' : 'Pendiente'}</div></div>
            <div class="list-item"><div class="list-label">Historico semanal guardado</div><div class="pill ok">${allSnapshots.length} snapshots</div></div>
            <div class="list-item"><div class="list-label">Backfill de 4 meses</div><div class="pill ok">Historico inicial cargado</div></div>
            <div class="list-item"><div class="list-label">Auditoria tecnica</div><div class="pill ${currentAuditSummary ? 'ok' : (currentProject.semrush_project_id ? 'partial' : 'missing')}">${currentAuditSummary ? 'Disponible' : (currentProject.semrush_project_id ? 'Sin resumen aun' : 'Falta project ID')}</div></div>
            <div class="list-item"><div class="list-label">Resumen semanal Semrush</div><div class="pill ok">Disponible</div></div>
            <div class="list-item"><div class="list-label">Keywords</div><div class="pill ${currentKeywordCount ? 'ok' : 'missing'}">${currentKeywordCount ? currentKeywords.length + ' visibles · ' + currentKeywordCount + ' recogidas' : 'Pendiente'}</div></div>
            <div class="list-item"><div class="list-label">Top URLs derivadas</div><div class="pill ${topUrls.length ? 'ok' : 'partial'}">${topUrls.length ? topUrls.length + ' visibles' : 'Sin datos aun'}</div></div>
          </div>
          <div id="page-msg" class="msg"></div>
        </div>

        <details class="fold">
          <summary>
            <div class="fold-title">Lectura de fuente disponible hoy</div>
            <span class="badge">Fuente cruda y snapshot actual</span>
          </summary>
          <div class="fold-body">
            <div class="list">
              <div class="list-item"><div class="list-label">Dominio Semrush</div><div class="list-value mono">${escapeHtml(normalizeDomain(currentProject.domain || currentProject.gsc_site_url || currentProject.intake_data?.url || ''))}</div></div>
              <div class="list-item"><div class="list-label">Snapshots guardados</div><div class="list-value">${allSnapshots.length}</div></div>
              <div class="list-item"><div class="list-label">Ultimo refresco</div><div class="list-value">${formatDateTime(latest.created_at)}</div></div>
            </div>
            <div>
              <div class="card-title" style="margin-bottom:10px">Snapshot actual</div>
              <div class="code">${escapeHtml(JSON.stringify(latest, null, 2))}</div>
            </div>
          </div>
        </details>`;
    }

    function renderKPI(label, value, sub) {
      return `<div class="card"><div class="card-title">${label}</div><div class="kpi-value">${value}</div><div class="kpi-sub">${sub}</div></div>`;
    }

    function renderAuditSummary(summary, semrushProjectId) {
      if (!semrushProjectId) {
        return '<div class="empty">Falta guardar el <strong>Project ID</strong> de Semrush en <strong>Mi cuenta</strong> para leer la auditoria tecnica del sitio.</div>';
      }
      if (!summary) {
        return '<div class="empty">Todavia no hay resumen de auditoria guardado para este snapshot. Si el Project ID ya esta bien conectado, pulsa <strong>Actualizar</strong>.</div>';
      }

      return `
        <div class="grid-4" style="margin-bottom:16px">
          ${renderKPI('Estado', escapeHtml(summary.audit_status || '—'), 'Estado del ultimo crawl')}
          ${renderKPI('Errors', fmtNum(summary.errors || 0), 'Issues criticos detectados')}
          ${renderKPI('Warnings', fmtNum(summary.warnings || 0), 'Issues medios detectados')}
          ${renderKPI('Notices', fmtNum(summary.notices || 0), 'Señales informativas')}
        </div>
        <div class="grid-4" style="margin-bottom:0">
          ${renderKPI('Paginas rastreadas', fmtNum(summary.pages_crawled || 0), 'Cobertura real del crawl')}
          ${renderKPI('Limite de paginas', fmtNum(summary.pages_limit || 0), 'Capacidad actual de auditoria')}
          ${renderKPI('Checks ejecutados', fmtNum(summary.total_checks || 0), 'Chequeos tecnicos realizados')}
          ${renderKPI('Ultima auditoria', formatDateTime(summary.latest_snapshot_finish_at || summary.last_audit_at), 'Fecha del ultimo audit detectado')}
        </div>`;
    }

    function renderWeeklySeries(snaps) {
      var ordered = snaps.slice().reverse();
      return `
        <div class="mini-grid">
          <div class="mini-series"><div class="card-title" style="margin-bottom:10px">Keywords</div>${renderMiniBars(ordered, 'semrush_keywords', '')}</div>
          <div class="mini-series"><div class="card-title" style="margin-bottom:10px">Top 3</div>${renderMiniBars(ordered, 'semrush_top3', 'green')}</div>
          <div class="mini-series"><div class="card-title" style="margin-bottom:10px">Top 10</div>${renderMiniBars(ordered, 'semrush_top10', 'orange')}</div>
          <div class="mini-series"><div class="card-title" style="margin-bottom:10px">Posicion media</div>${renderMiniBars(ordered, 'semrush_avg_position', 'orange')}</div>
        </div>`;
    }

    function renderMiniBars(snaps, field, colorClass) {
      if (!snaps.length) return '<div class="empty">Sin serie todavia.</div>';
      var values = snaps.map(function(snap) { return Number(snap[field] || 0); });
      var max = Math.max.apply(null, values.concat([1]));
      return `<div class="mini-chart">
        ${snaps.map(function(snap, idx) {
          var value = values[idx];
          var height = Math.max(20, Math.round(Math.max(0.12, value / max) * 130));
          return `<div class="mini-bar-wrap">
            <div class="mini-value">${Number(value || 0).toFixed(field === 'semrush_avg_position' ? 1 : 0)}</div>
            <div class="mini-bar ${colorClass}" style="height:${height}px"></div>
            <div class="mini-label">${formatShortWeek(snap.week_start)}</div>
          </div>`;
        }).join('')}
      </div>`;
    }

    function renderKeywordsTable(rows) {
      if (!rows.length) return '<div class="empty">Todavia no hay detalle de keywords guardado para este snapshot.</div>';
      return `<div class="table-wrap"><table><thead><tr><th>Keyword</th><th>Posicion</th><th>Volumen</th><th>Traffic %</th><th>URL</th></tr></thead><tbody>
        ${rows.map(function(row) {
          return `<tr>
            <td>${escapeHtml(row.keyword || '')}</td>
            <td>${row.position == null ? '—' : Number(row.position).toFixed(1)}</td>
            <td>${fmtNum(row.search_volume || 0)}</td>
            <td>${Number(row.traffic_percent || 0).toFixed(2)}%</td>
            <td class="mono">${escapeHtml(shortUrl(row.url || ''))}</td>
          </tr>`;
        }).join('')}
      </tbody></table></div>`;
    }

    function renderUrlsTable(rows) {
      if (!rows.length) return '<div class="empty">Todavia no hay URLs derivadas de las keywords de este snapshot.</div>';
      return `<div class="table-wrap"><table><thead><tr><th>URL</th><th>Keywords</th><th>Top 3</th><th>Top 10</th><th>Posicion media</th></tr></thead><tbody>
        ${rows.map(function(row) {
          return `<tr>
            <td class="mono">${escapeHtml(shortUrl(row.url || ''))}</td>
            <td>${fmtNum(row.keywords || 0)}</td>
            <td>${fmtNum(row.top3 || 0)}</td>
            <td>${fmtNum(row.top10 || 0)}</td>
            <td>${row.avgPosition == null ? '—' : Number(row.avgPosition).toFixed(1)}</td>
          </tr>`;
        }).join('')}
      </tbody></table></div>`;
    }

    function renderSnapshotRow(snap) {
      return `<tr>
        <td>${formatWeek(snap.week_start)}</td>
        <td>${fmtNum(snap.semrush_keywords || 0)}</td>
        <td>${fmtNum(snap.semrush_top3 || 0)}</td>
        <td>${fmtNum(snap.semrush_top10 || 0)}</td>
        <td>${Number(snap.semrush_avg_position || 0).toFixed(1)}</td>
        <td>${formatDateTime(snap.created_at)}</td>
      </tr>`;
    }

    function buildTopUrls(rows) {
      var map = {};
      rows.forEach(function(row) {
        if (!row.url) return;
        if (!map[row.url]) {
          map[row.url] = { url: row.url, keywords: 0, top3: 0, top10: 0, positions: [] };
        }
        map[row.url].keywords += 1;
        if (Number(row.position || 0) > 0 && Number(row.position) <= 3) map[row.url].top3 += 1;
        if (Number(row.position || 0) > 0 && Number(row.position) <= 10) map[row.url].top10 += 1;
        if (Number.isFinite(Number(row.position))) map[row.url].positions.push(Number(row.position));
      });

      return Object.values(map).map(function(item) {
        item.avgPosition = item.positions.length
          ? item.positions.reduce(function(sum, value) { return sum + value; }, 0) / item.positions.length
          : null;
        return item;
      }).sort(function(a, b) { return (b.keywords || 0) - (a.keywords || 0); }).slice(0, 10);
    }

    async function refreshSemrushData() {
      var btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.classList.add('spinning');
      showMsg('Actualizando datos de Semrush...', 'info');

      try {
        var res = await fetch(`${SUPABASE_URL}/functions/v1/collect-semrush`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + SUPABASE_ANON
          },
          body: JSON.stringify({ project_id: currentProject.id })
        });
        var data = await res.json();

        if (!res.ok || data.error) {
          showMsg(data.error || 'No se pudieron actualizar los datos de Semrush.', 'error');
          return;
        }

        await loadSnapshots();
        await loadDetailData();
        renderSemrushData();
        showMsg('Datos de Semrush actualizados para este proyecto.', 'success');
      } catch (e) {
        console.error(e);
        showMsg('Error de red al actualizar Semrush.', 'error');
      } finally {
        btn.disabled = false;
        btn.classList.remove('spinning');
      }
    }

    function showMsg(text, type) {
      var msg = document.getElementById('page-msg');
      if (!msg) return;
      msg.className = 'msg show ' + (type || 'info');
      msg.textContent = text;
    }

    function renderNoProject(customMessage) {
      document.getElementById('main-container').innerHTML = `
        <div class="card" style="text-align:center;padding:80px 24px">
          <div style="font-size:18px;font-weight:700;margin-bottom:8px">No hay proyecto disponible</div>
          <div class="empty" style="margin-bottom:18px">${customMessage || 'Completa el onboarding para poder ver datos de Semrush.'}</div>
          <a href="/" class="btn btn-accent">Ir al onboarding</a>
        </div>`;
    }

    function normalizeDomain(value) {
      return String(value || '').trim().toLowerCase().replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/$/, '').split('/')[0];
    }
    function getProjectSlug(project) {
      var hostname = normalizeDomain(project?.domain || project?.gsc_site_url || project?.intake_data?.url || '');
      if (!hostname) return 'project';
      var first = hostname.split('.')[0] || hostname;
      return first.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'project';
    }
    function getProjectPath(project) { return '/project/' + getProjectSlug(project); }
    function getRequestedProjectSlug() {
      var match = window.location.pathname.match(/^\/project\/([^/]+)\/semrush$/);
      if (match && match[1]) return decodeURIComponent(match[1]).toLowerCase();
      var params = new URLSearchParams(window.location.search);
      return (params.get('project') || '').toLowerCase() || null;
    }
    function resolveProject(projects, requestedSlug) {
      if (!projects || !projects.length) return null;
      if (!requestedSlug) return projects[0];
      return projects.find(function(project) {
        return getProjectSlug(project) === requestedSlug || String(project.id).toLowerCase() === requestedSlug;
      }) || null;
    }
    function syncProjectPath(project) {
      var target = getProjectPath(project) + '/semrush';
      if (window.location.pathname !== target) window.history.replaceState({}, '', target);
    }
    function fmtNum(n) {
      n = Number(n || 0);
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toString();
    }
    function formatWeek(dateStr) {
      if (!dateStr) return '—';
      var d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
    }
    function formatShortWeek(dateStr) {
      if (!dateStr) return '—';
      var d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'numeric' });
    }
    function formatDateTime(value) {
      if (!value) return '—';
      return new Date(value).toLocaleString('es-ES', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    }
    function formatPlan(plan) {
      var value = String(plan || 'basic').toLowerCase();
      if (value === 'early_access') return 'Starter';
      return value.charAt(0).toUpperCase() + value.slice(1);
    }
    function shortUrl(value) {
      return String(value || '').replace(/^https?:\/\//, '').replace(/^www\./, '');
    }
    function escapeHtml(value) {
      return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }
  </script>
</body>
