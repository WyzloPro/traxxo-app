<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traxxo — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght:300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090b; 
      --surface: #111113; 
      --border: #1f1f23;
      --text: #fafafa; 
      --muted: #71717a; 
      --accent: #22d3ee;
      --font: 'Inter', system-ui, sans-serif;
    }
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: var(--font); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 24px; 
    }
    .card {
      background: var(--surface); 
      border: 1px solid var(--border);
      border-radius: 16px; 
      padding: 40px; 
      width: 100%; 
      max-width: 400px;
    }
    .logo {
      display: flex; 
      align-items: center; 
      gap: 10px;
      font-size: 18px; 
      font-weight: 700; 
      margin-bottom: 32px;
    }
    .btn-google {
      width: 100%; 
      padding: 14px; 
      border-radius: 8px; 
      border: none;
      background: #4285f4; 
      color: white; 
      font-size: 15px; 
      font-weight: 500; 
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .btn-google:hover { opacity: 0.9; }
    .btn {
      width: 100%; 
      padding: 12px; 
      border-radius: 8px; 
      border: none;
      background: var(--accent); 
      color: #000; 
      font-size: 14px;
      font-weight: 600; 
      cursor: pointer;
    }
    .msg { 
      font-size: 13px; 
      margin-top: 16px; 
      padding: 10px 14px; 
      border-radius: 8px; 
      display: none; 
    }
    .msg.success { background: rgba(34,211,238,.15); color: var(--accent); }
    .msg.error { background: rgba(239,68,68,.15); color: #f87171; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span style="font-size:24px;">📊</span>
    traxxo
  </div>

  <button onclick="connectGoogle()" class="btn-google" type="button">
    <span>🔵</span> Continuar con Google
  </button>

  <div style="text-align:center; color:var(--muted); font-size:13px; margin:16px 0;">
    o con email
  </div>

  <!-- Tu formulario de email/password -->
  <form method="POST" action="/login">
    <label style="font-size:12px; color:var(--muted);">EMAIL</label>
    <input type="email" name="email" value="danielpetermanns@gmail.com" style="margin-bottom:12px;" />

    <label style="font-size:12px; color:var(--muted);">CONTRASEÑA</label>
    <input type="password" name="password" placeholder="••••••••" />

    <button type="submit" class="btn" style="margin-top:16px;">Entrar</button>
  </form>

  <div class="msg" id="login-msg"></div>
</div>

<script>
// ==================== GOOGLE LOGIN ====================
async function connectGoogle() {
  console.log("✅ Botón Google clickeado - Iniciando login...");

  const msg = document.getElementById('login-msg');

  try {
    msg.textContent = "Redirigiendo a Google...";
    msg.className = "msg success";
    msg.style.display = "block";

    // ←←← PON AQUÍ TUS DATOS REALES DE SUPABASE ←←←
    const supabaseUrl = 'https://TU-PROJECT.supabase.co'; 
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // tu anon key completa

    const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + window.location.pathname  // vuelve a esta misma página
      }
    });

    if (error) throw error;

  } catch (err) {
    console.error("❌ Error en Google login:", err);
    msg.textContent = "Error: " + (err.message || err);
    msg.className = "msg error";
    msg.style.display = "block";
  }
}

// Para depuración
console.log("Traxxo login page cargada - Botón Google listo");
</script>

</body>
</html>
