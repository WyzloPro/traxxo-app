<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traxxo — Datos GA4</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#09090b; --surface:#111113; --border:#1f1f23;
      --text:#fafafa; --muted:#71717a; --accent:#22d3ee;
      --green:#10b981; --orange:#f59e0b; --amber:#f59e0b;
      --font:'Inter', system-ui, sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; -webkit-font-smoothing:antialiased; }
    .header { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:100; }
    .header-left, .header-right { display:flex; align-items:center; gap:12px; }
    .logo { display:flex; align-items:center; gap:8px; font-size:16px; font-weight:700; }
    .divider { width:1px; height:20px; background:var(--border); }
    .domain-badge { font-size:12px; color:var(--muted); background:var(--bg); border:1px solid var(--border); padding:4px 10px; border-radius:20px; }
    .plan-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; background:rgba(34,211,238,.1); color:var(--accent); border:1px solid rgba(34,211,238,.2); }
    .btn { padding:8px 14px; border-radius:8px; font-size:12px; font-weight:600; font-family:var(--font); cursor:pointer; border:none; transition:opacity .15s; white-space:nowrap; text-decoration:none; }
    .btn-ghost { background:none; border:1px solid var(--border); color:var(--muted); }
    .btn-accent { background:var(--accent); color:#000; }
    .btn-accent:hover, .btn-ghost:hover { opacity:.85; }
    .btn-accent:disabled { opacity:.5; cursor:not-allowed; }
    #refresh-btn { display:flex; align-items:center; gap:6px; }
    #refresh-btn.spinning svg { animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .container { max-width:1180px; margin:0 auto; padding:24px; }
    .hero { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px; }
    .hero h1 { font-size:28px; line-height:1.1; margin-bottom:8px; }
    .hero p { font-size:14px; color:var(--muted); max-width:760px; line-height:1.5; }
    .badge { font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; background:rgba(34,211,238,.08); border:1px solid rgba(34,211,238,.2); color:var(--accent); }
    .grid-4, .grid-3, .grid-2 { display:grid; gap:16px; margin-bottom:16px; }
    .grid-4 { grid-template-columns:repeat(4,1fr); }
    .grid-3 { grid-template-columns:repeat(3,1fr); }
    .grid-2 { grid-template-columns:1fr 1fr; }
    .detail-stack { display:grid; gap:16px; margin-bottom:16px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px; }
    .card-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .card-title { font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:700; }
    .kpi-value { font-size:22px; font-weight:700; margin-bottom:6px; }
    .kpi-sub { font-size:12px; color:var(--muted); }
    .table-wrap { overflow:auto; border:1px solid var(--border); border-radius:12px; }
    table { width:100%; border-collapse:collapse; min-width:720px; }
    th, td { text-align:left; padding:12px 14px; border-bottom:1px solid rgba(255,255,255,.05); font-size:13px; }
    th { font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); background:rgba(255,255,255,.01); }
    tr:last-child td { border-bottom:none; }
    .msg { display:none; margin-top:12px; padding:12px 14px; border-radius:12px; font-size:13px; }
    .msg.show { display:block; }
    .msg.success { background:rgba(16,185,129,.12); color:var(--green); border:1px solid rgba(16,185,129,.2); }
    .msg.error { background:rgba(239,68,68,.12); color:#fca5a5; border:1px solid rgba(239,68,68,.2); }
    .msg.info { background:rgba(34,211,238,.1); color:var(--accent); border:1px solid rgba(34,211,238,.2); }
    .empty { color:var(--muted); font-size:13px; }
    .pill { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; }
    .pill.ok { background:rgba(16,185,129,.12); color:var(--green); border:1px solid rgba(16,185,129,.2); }
    .pill.missing { background:rgba(239,68,68,.12); color:#fca5a5; border:1px solid rgba(239,68,68,.2); }
    .pill.partial { background:rgba(245,158,11,.12); color:var(--amber); border:1px solid rgba(245,158,11,.2); }
    .mini-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; }
    .mini-series { min-width:0; }
    .mini-chart { display:flex; align-items:flex-end; gap:8px; height:210px; padding-top:8px; }
    .mini-bar-wrap { flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:8px; height:100%; }
    .mini-bar { width:100%; border-radius:10px 10px 4px 4px; min-height:6px; background:var(--accent); opacity:.9; }
    .mini-bar.orange { background:var(--orange); }
    .mini-bar.green { background:var(--green); }
    .mini-label { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
    .mini-value { font-size:11px; color:var(--text); font-weight:600; }
    details.fold { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px; }
    details.fold summary { list-style:none; display:flex; align-items:center; justify-content:space-between; gap:16px; cursor:pointer; }
    details.fold summary::-webkit-details-marker { display:none; }
    .fold-title { font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:700; }
    .fold-body { margin-top:16px; display:grid; gap:14px; }
    .list { display:grid; gap:10px; }
    .list-item { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:10px 12px; border:1px solid rgba(255,255,255,.05); border-radius:12px; background:rgba(255,255,255,.01); }
    .list-label { font-size:13px; color:var(--muted); }
    .list-value { font-size:13px; color:var(--text); font-weight:600; }
    .mono { font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
    .code { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:14px; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px; color:#cbd5e1; overflow:auto; max-height:320px; white-space:pre-wrap; }
    @media (max-width: 980px) {
      .grid-4, .grid-3, .grid-2, .mini-grid { grid-template-columns:1fr; }
      .hero { flex-direction:column; }
      .header { padding:12px 16px; }
      .container { padding:16px; }
      .mini-chart { height:180px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="7" fill="#22d3ee" fill-opacity=".12"/>
          <path d="M5 12h4l2-5 2 10 2-5h2" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        traxxo
      </div>
      <div class="divider"></div>
      <div class="domain-badge" id="header-domain">Cargando...</div>
    </div>
    <div class="header-right">
      <span class="plan-badge" id="header-plan">Basic</span>
      <button class="btn btn-accent" id="refresh-btn" onclick="refreshGa4Data()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
        </svg>
        Actualizar
      </button>
      <a href="/google-data.html" class="btn btn-ghost" id="gsc-link">Datos GSC</a>
      <a href="/dashboard.html" class="btn btn-ghost" id="analysis-link">← Dashboard analisis</a>
    </div>
  </div>

  <div class="container" id="main-container">
    <div style="text-align:center;padding:80px 24px;color:var(--muted)">Cargando datos GA4...</div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://ghqttckqvjptxhihojey.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdocXR0Y2txdmpwdHhoaWhvamV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDU1OTYsImV4cCI6MjA5MTIyMTU5Nn0.KlPDplMIIWQwx5oafvkfxbsm0dzPb0cbTJpCM83cqK4';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    let currentSession = null;
    let currentProject = null;
    let allSnapshots = [];
    let currentChannels = [];
    let currentLandingPages = [];
    let currentCountries = [];
    let currentDevices = [];
    let currentConversionEvents = [];
    let currentChannelsTotal = 0;
    let currentLandingPagesTotal = 0;
    let currentCountriesTotal = 0;
    let currentDevicesTotal = 0;
    let currentConversionEventsTotal = 0;

    sb.auth.getSession().then(async function({ data: { session } }) {
      if (!session) { window.location.href = '/'; return; }
      currentSession = session;
      var requestedProjectSlug = getRequestedProjectSlug();

      var { data: projects } = await sb.from('projects')
        .select('*')
        .eq('client_id', session.user.id)
        .eq('active', true);

      if (!projects || !projects.length) return renderNoProject();

      currentProject = resolveProject(projects, requestedProjectSlug);
      if (!currentProject) return renderNoProject('No se ha encontrado ese proyecto.');

      syncProjectPath(currentProject);

      var { data: client } = await sb.from('clients').select('plan').eq('id', session.user.id).single();
      document.getElementById('header-domain').textContent = currentProject.domain || currentProject.gsc_site_url || 'Sin dominio';
      document.getElementById('header-plan').textContent = formatPlan(client?.plan || 'basic');
      document.getElementById('analysis-link').href = getProjectPath(currentProject);
      document.getElementById('gsc-link').href = getGoogleDataPath(currentProject);

      await loadSnapshots();
      await loadDetailData();
      renderGa4Data();
    });

    async function loadSnapshots() {
      var { data: snapshots } = await sb.from('weekly_snapshots')
        .select('*')
        .eq('project_id', currentProject.id)
        .order('week_start', { ascending: false })
        .limit(26);
      allSnapshots = (snapshots || []).filter(function(snapshot) {
        return Number(snapshot.ga4_sessions || 0) > 0
          || Number(snapshot.ga4_users || 0) > 0
          || Number(snapshot.ga4_conversions || 0) > 0
          || Number(snapshot.ga4_revenue || 0) > 0
          || Number(snapshot.ga4_engaged_sessions || 0) > 0
          || Number(snapshot.ga4_engagement_rate || 0) > 0
          || Number(snapshot.ga4_avg_session_duration || 0) > 0;
      });
    }

    async function loadDetailData() {
      if (!allSnapshots.length) {
        currentChannels = [];
        currentLandingPages = [];
        currentCountries = [];
        currentDevices = [];
        currentConversionEvents = [];
        currentChannelsTotal = 0;
        currentLandingPagesTotal = 0;
        currentCountriesTotal = 0;
        currentDevicesTotal = 0;
        currentConversionEventsTotal = 0;
        return;
      }

      var latest = allSnapshots[0];
      var [
        { count: channelsCount },
        { count: landingPagesCount },
        { count: countriesCount },
        { count: devicesCount },
        { count: conversionEventsCount },
        { data: channels },
        { data: landingPages },
        { data: countries },
        { data: devices },
        { data: conversionEvents }
      ] = await Promise.all([
        sb.from('snapshot_ga4_channels')
          .select('*', { count: 'exact', head: true })
          .eq('snapshot_id', latest.id),
        sb.from('snapshot_ga4_landing_pages')
          .select('*', { count: 'exact', head: true })
          .eq('snapshot_id', latest.id),
        sb.from('snapshot_ga4_countries')
          .select('*', { count: 'exact', head: true })
          .eq('snapshot_id', latest.id),
        sb.from('snapshot_ga4_devices')
          .select('*', { count: 'exact', head: true })
          .eq('snapshot_id', latest.id),
        sb.from('snapshot_ga4_conversion_events')
          .select('*', { count: 'exact', head: true })
          .eq('snapshot_id', latest.id),
        sb.from('snapshot_ga4_channels')
          .select('*')
          .eq('snapshot_id', latest.id)
          .order('sessions', { ascending: false })
          .limit(10),
        sb.from('snapshot_ga4_landing_pages')
          .select('*')
          .eq('snapshot_id', latest.id)
          .order('sessions', { ascending: false })
          .limit(10),
        sb.from('snapshot_ga4_countries')
          .select('*')
          .eq('snapshot_id', latest.id)
          .order('sessions', { ascending: false })
          .limit(10),
        sb.from('snapshot_ga4_devices')
          .select('*')
          .eq('snapshot_id', latest.id)
          .order('sessions', { ascending: false })
          .limit(10),
        sb.from('snapshot_ga4_conversion_events')
          .select('*')
          .eq('snapshot_id', latest.id)
          .order('key_events', { ascending: false })
          .limit(10),
      ]);

      currentChannels = channels || [];
      currentLandingPages = landingPages || [];
      currentCountries = countries || [];
      currentDevices = devices || [];
      currentConversionEvents = conversionEvents || [];
      currentChannelsTotal = channelsCount || 0;
      currentLandingPagesTotal = landingPagesCount || 0;
      currentCountriesTotal = countriesCount || 0;
      currentDevicesTotal = devicesCount || 0;
      currentConversionEventsTotal = conversionEventsCount || 0;
    }

    function renderGa4Data() {
      var ga4Config = currentProject?.intake_data?.ga4 || null;
      if (!ga4Config?.propertyId) {
        document.getElementById('main-container').innerHTML = `
          <div class="card">
            <div class="hero">
              <div>
                <h1>Datos Google Analytics 4</h1>
                <p>Esta vista separa la fuente GA4 de la capa de analisis. Primero conectamos y descargamos la materia prima; despues el cerebro la interpretara.</p>
              </div>
              <span class="badge">GA4 pendiente</span>
            </div>
            <div class="empty">Todavia no hay una propiedad GA4 elegida para este proyecto. Ve a <strong>Mi cuenta</strong> y selecciona una propiedad.</div>
            <div id="page-msg" class="msg"></div>
          </div>`;
        return;
      }

      if (!allSnapshots.length) {
        document.getElementById('main-container').innerHTML = `
          <div class="card">
            <div class="hero">
              <div>
                <h1>Datos Google Analytics 4</h1>
                <p>Aqui veras la fuente cruda de GA4 para <strong>${escapeHtml(currentProject.domain || 'este proyecto')}</strong>, antes de mezclarla con otras capas.</p>
              </div>
              <span class="badge">Sin snapshots todavia</span>
            </div>
            <div class="empty">La propiedad ya esta conectada, pero aun no hay snapshots GA4. Pulsa <strong>Actualizar</strong> para generar el primero.</div>
            <div id="page-msg" class="msg"></div>
          </div>`;
        return;
      }

      var latest = allSnapshots[0];
      document.getElementById('main-container').innerHTML = `
        <div class="hero">
          <div>
            <h1>Datos Google Analytics 4</h1>
            <p>Esta vista deja GA4 como fuente separada. Aqui ves sesiones, usuarios, conversiones, revenue, canales y landings que Traxxo ya ha descargado para <strong>${escapeHtml(currentProject.domain || 'este proyecto')}</strong>.</p>
          </div>
          <span class="badge">${allSnapshots.length} snapshots cargados</span>
        </div>

        <div class="grid-4">
          ${renderKPI('Ultima semana', formatWeek(latest.week_start), 'Periodo base para la lectura')}
          ${renderKPI('Sesiones', fmtNum(latest.ga4_sessions), 'Dato descargado de GA4')}
          ${renderKPI('Usuarios', fmtNum(latest.ga4_users), 'Dato descargado de GA4')}
          ${renderKPI('Conversiones', fmtDecimal(latest.ga4_conversions), 'Revenue ' + fmtCurrency(latest.ga4_revenue))}
        </div>

        <div class="grid-3">
          ${renderKPI('Engaged sessions', fmtNum(latest.ga4_engaged_sessions), 'Sesiones con engagement')}
          ${renderKPI('Engagement rate', fmtPercent(latest.ga4_engagement_rate), 'Calidad del trafico')}
          ${renderKPI('Duracion media', fmtDuration(latest.ga4_avg_session_duration), 'Tiempo medio por sesion')}
        </div>

        <div class="card" style="margin-bottom:16px">
          <div class="card-header">
            <div class="card-title">Series semanales disponibles</div>
          </div>
          ${renderWeeklySeries(allSnapshots)}
        </div>

        <div class="detail-stack">
          <div class="card">
            <div class="card-header">
              <div class="card-title">Top channels GA4</div>
              <span class="badge">${currentChannels.length} visibles · ${currentChannelsTotal} recogidos</span>
            </div>
            ${renderChannelsTable(currentChannels)}
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">Top landing pages GA4</div>
              <span class="badge">${currentLandingPages.length} visibles · ${currentLandingPagesTotal} recogidas</span>
            </div>
            ${renderLandingPagesTable(currentLandingPages)}
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">Top countries GA4</div>
              <span class="badge">${currentCountries.length} visibles · ${currentCountriesTotal} recogidos</span>
            </div>
            ${renderCountriesTable(currentCountries)}
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">Top devices GA4</div>
              <span class="badge">${currentDevices.length} visibles · ${currentDevicesTotal} recogidos</span>
            </div>
            ${renderDevicesTable(currentDevices)}
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">Top eventos y conversiones GA4</div>
              <span class="badge">${currentConversionEvents.length} visibles · ${currentConversionEventsTotal} recogidos</span>
            </div>
            ${renderConversionEventsTable(currentConversionEvents)}
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <div class="card-header">
              <div class="card-title">Historico de snapshots GA4</div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Periodo</th>
                    <th>Sesiones</th>
                    <th>Engaged</th>
                    <th>Engagement</th>
                    <th>Usuarios</th>
                    <th>Conversiones</th>
                    <th>Revenue</th>
                    <th>Actualizado</th>
                  </tr>
                </thead>
                <tbody>
                  ${allSnapshots.map(renderSnapshotRow).join('')}
                </tbody>
              </table>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">Cobertura actual de datos GA4</div>
            </div>
            <div class="grid-3" style="margin-bottom:0">
              <div class="list-item"><div class="list-label">Propiedad GA4</div><div class="pill ok">Conectada</div></div>
              <div class="list-item"><div class="list-label">Historico semanal guardado</div><div class="pill ok">${allSnapshots.length} snapshots</div></div>
              <div class="list-item"><div class="list-label">Backfill de 4 meses</div><div class="pill ok">Historico inicial cargado</div></div>
              <div class="list-item"><div class="list-label">Resumen semanal GA4</div><div class="pill ok">Disponible</div></div>
              <div class="list-item"><div class="list-label">Channels</div><div class="pill ${currentChannelsTotal ? 'ok' : 'missing'}">${currentChannelsTotal ? currentChannels.length + ' visibles · ' + currentChannelsTotal + ' recogidos' : 'Pendiente'}</div></div>
              <div class="list-item"><div class="list-label">Landing pages</div><div class="pill ${currentLandingPagesTotal ? 'ok' : 'missing'}">${currentLandingPagesTotal ? currentLandingPages.length + ' visibles · ' + currentLandingPagesTotal + ' recogidas' : 'Pendiente'}</div></div>
              <div class="list-item"><div class="list-label">Countries</div><div class="pill ${currentCountriesTotal ? 'ok' : 'missing'}">${currentCountriesTotal ? currentCountries.length + ' visibles · ' + currentCountriesTotal + ' recogidos' : 'Pendiente'}</div></div>
              <div class="list-item"><div class="list-label">Devices</div><div class="pill ${currentDevicesTotal ? 'ok' : 'missing'}">${currentDevicesTotal ? currentDevices.length + ' visibles · ' + currentDevicesTotal + ' recogidos' : 'Pendiente'}</div></div>
              <div class="list-item"><div class="list-label">Eventos clave</div><div class="pill ${currentConversionEventsTotal ? 'ok' : 'missing'}">${currentConversionEventsTotal ? currentConversionEvents.length + ' visibles · ' + currentConversionEventsTotal + ' recogidos' : 'Pendiente'}</div></div>
            </div>
            <div id="page-msg" class="msg"></div>
          </div>
        </div>

        <details class="fold">
          <summary>
            <div class="fold-title">Lectura de fuente disponible hoy</div>
            <span class="badge">Fuente cruda y snapshot actual</span>
          </summary>
          <div class="fold-body">
            <div class="list">
              <div class="list-item"><div class="list-label">Propiedad GA4</div><div class="list-value mono">${escapeHtml(ga4Config.propertyId || 'No configurada')}</div></div>
              <div class="list-item"><div class="list-label">Measurement ID</div><div class="list-value mono">${escapeHtml(ga4Config.measurementId || 'Sin dato')}</div></div>
              <div class="list-item"><div class="list-label">Display name</div><div class="list-value">${escapeHtml(ga4Config.displayName || 'Sin dato')}</div></div>
              <div class="list-item"><div class="list-label">Ultimo refresco</div><div class="list-value">${formatDateTime(latest.created_at)}</div></div>
            </div>
            <div>
              <div class="card-title" style="margin-bottom:10px">Snapshot actual</div>
              <div class="code">${escapeHtml(JSON.stringify(latest, null, 2))}</div>
            </div>
          </div>
        </details>`;
    }

    function renderKPI(label, value, sub) {
      return `<div class="card"><div class="card-title">${label}</div><div class="kpi-value">${value}</div><div class="kpi-sub">${sub}</div></div>`;
    }

    function renderWeeklySeries(snaps) {
      var ordered = snaps.slice().reverse();
      return `
        <div class="mini-grid">
          <div class="mini-series"><div class="card-title" style="margin-bottom:10px">Sesiones</div>${renderMiniBars(ordered, 'ga4_sessions', '')}</div>
          <div class="mini-series"><div class="card-title" style="margin-bottom:10px">Usuarios</div>${renderMiniBars(ordered, 'ga4_users', 'green')}</div>
          <div class="mini-series"><div class="card-title" style="margin-bottom:10px">Conversiones</div>${renderMiniBars(ordered, 'ga4_conversions', 'orange')}</div>
          <div class="mini-series"><div class="card-title" style="margin-bottom:10px">Revenue</div>${renderMiniBars(ordered, 'ga4_revenue', 'orange')}</div>
          <div class="mini-series"><div class="card-title" style="margin-bottom:10px">Engaged sessions</div>${renderMiniBars(ordered, 'ga4_engaged_sessions', 'green')}</div>
          <div class="mini-series"><div class="card-title" style="margin-bottom:10px">Engagement rate</div>${renderMiniBars(ordered, 'ga4_engagement_rate', '')}</div>
        </div>`;
    }

    function renderMiniBars(snaps, field, colorClass) {
      if (!snaps.length) return '<div class="empty">Sin serie todavia.</div>';
      var values = snaps.map(function(snap) { return Number(snap[field] || 0); });
      var max = Math.max.apply(null, values.concat([1]));
      return `
        <div class="mini-chart">
          ${snaps.map(function(snap, idx) {
            var value = values[idx];
            var height = Math.max(20, Math.round(Math.max(0.12, value / max) * 130));
            return `
              <div class="mini-bar-wrap">
                <div class="mini-value">${field === 'ga4_revenue' ? fmtCurrency(value) : field === 'ga4_engagement_rate' ? fmtPercent(value) : fmtNum(value)}</div>
                <div class="mini-bar ${colorClass}" style="height:${height}px"></div>
                <div class="mini-label">${formatShortWeek(snap.week_start)}</div>
              </div>`;
          }).join('')}
        </div>`;
    }

    function renderSnapshotRow(snap) {
      return `
        <tr>
          <td>${formatWeek(snap.week_start)}</td>
          <td>${fmtNum(snap.ga4_sessions)}</td>
          <td>${fmtNum(snap.ga4_engaged_sessions)}</td>
          <td>${fmtPercent(snap.ga4_engagement_rate)}</td>
          <td>${fmtNum(snap.ga4_users)}</td>
          <td>${fmtDecimal(snap.ga4_conversions)}</td>
          <td>${fmtCurrency(snap.ga4_revenue)}</td>
          <td>${formatDateTime(snap.created_at)}</td>
        </tr>`;
    }

    async function refreshGa4Data() {
      var btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.classList.add('spinning');
      showMsg('Actualizando datos de Google Analytics 4...', 'info');

      try {
        var res = await fetch(`${SUPABASE_URL}/functions/v1/collect-ga4`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + SUPABASE_ANON
          },
          body: JSON.stringify({ project_id: currentProject.id })
        });
        var data = await res.json();

        if (!res.ok || data.error) {
          showMsg(mapCollectGa4Error(data), 'error');
          return;
        }

        await loadSnapshots();
        await loadDetailData();
        renderGa4Data();
        showMsg('Datos de GA4 actualizados para este proyecto.', 'success');
      } catch (e) {
        console.error(e);
        showMsg('Error de red al actualizar GA4.', 'error');
      } finally {
        btn.disabled = false;
        btn.classList.remove('spinning');
      }
    }

    function mapCollectGa4Error(data) {
      if (!data) return 'No se pudieron actualizar los datos de GA4.';
      if (data.code === 'reauthorization_required' || data.code === 'missing_refresh_token' || data.code === 'missing_google_connection') {
        return 'La conexion de Google necesita reautorizacion. Ve a Mi cuenta para reconectar las herramientas.';
      }
      if (data.code === 'refresh_failed') {
        return 'No se pudo renovar el acceso de Google. Ve a Mi cuenta si necesitas reconectar las herramientas.';
      }
      return data.error || 'No se pudieron actualizar los datos de GA4.';
    }

    function showMsg(text, type) {
      var msg = document.getElementById('page-msg');
      if (!msg) return;
      msg.className = 'msg show ' + (type || 'info');
      msg.textContent = text;
    }

    function renderNoProject(customMessage) {
      document.getElementById('main-container').innerHTML = `
        <div class="card" style="text-align:center;padding:80px 24px">
          <div style="font-size:18px;font-weight:700;margin-bottom:8px">No hay proyecto disponible</div>
          <div class="empty" style="margin-bottom:18px">${customMessage || 'Completa el onboarding para poder ver datos de GA4.'}</div>
          <a href="/" class="btn btn-accent">Ir al onboarding</a>
        </div>`;
    }

    function normalizeProjectDomain(project) {
      var raw = project?.domain || project?.gsc_site_url || project?.intake_data?.url || '';
      var clean = String(raw || '').trim().toLowerCase();
      clean = clean.replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/$/, '');
      return clean;
    }

    function getProjectSlug(project) {
      var hostname = normalizeProjectDomain(project);
      if (!hostname) return 'project';
      var first = hostname.split('.')[0] || hostname;
      return first.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'project';
    }

    function getProjectPath(project) { return '/project/' + getProjectSlug(project); }
    function getGoogleDataPath(project) { return getProjectPath(project) + '/google'; }

    function getRequestedProjectSlug() {
      var match = window.location.pathname.match(/^\/project\/([^/]+)\/ga4$/);
      if (match && match[1]) return decodeURIComponent(match[1]).toLowerCase();
      var params = new URLSearchParams(window.location.search);
      return (params.get('project') || '').toLowerCase() || null;
    }

    function resolveProject(projects, requestedSlug) {
      if (!projects || !projects.length) return null;
      if (!requestedSlug) return projects[0];
      return projects.find(function(project) {
        return getProjectSlug(project) === requestedSlug || String(project.id).toLowerCase() === requestedSlug;
      }) || null;
    }

    function syncProjectPath(project) {
      var target = getProjectPath(project) + '/ga4';
      if (window.location.pathname !== target) {
        window.history.replaceState({}, '', target);
      }
    }

    function fmtNum(n) {
      n = Number(n || 0);
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toString();
    }

    function fmtDecimal(n) {
      return Number(n || 0).toFixed(1);
    }

    function fmtCurrency(n) {
      return new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(Number(n || 0));
    }

    function fmtPercent(n) {
      return (Number(n || 0) * 100).toFixed(2) + '%';
    }

    function fmtDuration(n) {
      var totalSeconds = Math.round(Number(n || 0));
      if (!totalSeconds) return '0s';
      var minutes = Math.floor(totalSeconds / 60);
      var seconds = totalSeconds % 60;
      if (!minutes) return seconds + 's';
      return minutes + 'm ' + String(seconds).padStart(2, '0') + 's';
    }

    function formatWeek(dateStr) {
      if (!dateStr) return '—';
      var d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function formatShortWeek(dateStr) {
      if (!dateStr) return '—';
      var d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'numeric' });
    }

    function formatDateTime(value) {
      if (!value) return '—';
      return new Date(value).toLocaleString('es-ES', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function formatPlan(plan) {
      var value = String(plan || 'basic').toLowerCase();
      if (value === 'early_access') return 'Starter';
      return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
